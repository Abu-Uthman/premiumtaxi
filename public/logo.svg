<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 150" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Premium Maxi Taxi</title>
  <desc id="logoDesc">Premium Maxi Taxi Melbourne refined wordmark with premium maxi taxi emblem</desc>
  <defs>
    <clipPath id="markClip">
      <rect x="10" y="10" width="130" height="130" rx="30"/>
    </clipPath>
    <linearGradient id="gold" x1="14" y1="14" x2="126" y2="136" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7df87"/>
      <stop offset="0.48" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#9f7419"/>
    </linearGradient>
    <linearGradient id="dark" x1="18" y1="20" x2="122" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#242424"/>
      <stop offset="1" stop-color="#080808"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="130" height="130" rx="30" fill="url(#dark)"/>
  <rect x="15" y="15" width="120" height="120" rx="26" fill="none" stroke="url(#gold)" stroke-width="5"/>
  <image href="/brand-vehicle-mark.webp" x="10" y="10" width="130" height="130" preserveAspectRatio="xMidYMid slice" clip-path="url(#markClip)"/>
  <rect x="15" y="15" width="120" height="120" rx="26" fill="none" stroke="url(#gold)" stroke-width="5"/>
  <text x="164" y="65" fill="#111111" font-family="Outfit, Montserrat, Arial, sans-serif" font-size="42" font-weight="800">Premium</text>
  <text x="164" y="108" fill="#111111" font-family="Outfit, Montserrat, Arial, sans-serif" font-size="42" font-weight="800">Maxi Taxi</text>
  <path d="M164 125h74" stroke="#d4af37" stroke-width="4" stroke-linecap="round"/>
  <text x="252" y="130" fill="#8b6a1f" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="2">MELBOURNE</text>
</svg>
