<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="logoMarkTitle logoMarkDesc">
  <title id="logoMarkTitle">Premium Maxi Taxi mark</title>
  <desc id="logoMarkDesc">Compact Premium Maxi Taxi Melbourne emblem</desc>
  <defs>
    <clipPath id="photoClip">
      <rect x="34" y="34" width="444" height="444" rx="96"/>
    </clipPath>
    <linearGradient id="gold" x1="72" y1="54" x2="440" y2="458" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7df87"/>
      <stop offset="0.48" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#9f7419"/>
    </linearGradient>
    <linearGradient id="black" x1="88" y1="76" x2="424" y2="436" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#262626"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#101010"/>
  <rect x="34" y="34" width="444" height="444" rx="96" fill="url(#black)" stroke="url(#gold)" stroke-width="18"/>
  <image href="/brand-vehicle-mark.webp" x="34" y="34" width="444" height="444" preserveAspectRatio="xMidYMid slice" clip-path="url(#photoClip)"/>
  <rect x="34" y="34" width="444" height="444" rx="96" fill="none" stroke="url(#gold)" stroke-width="18"/>
</svg>
